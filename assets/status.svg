<svg width="400" height="60" viewBox="0 0 400 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
      100% { opacity: 0.3; transform: scale(0.9); }
    }
    .glowing-dot {
      transform-origin: 30px 30px;
      animation: pulse 1.8s infinite ease-in-out;
      fill: #00FF66;
      filter: drop-shadow(0 0 8px rgba(0, 255, 102, 0.8));
    }
    .status-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
      fill: #FFFFFF;
      letter-spacing: 1px;
    }
  </style>
  <rect width="400" height="60" rx="10" fill="#0A0A0A" stroke="#222" stroke-width="1.5"/>
  <circle class="glowing-dot" cx="30" cy="30" r="7"/>
  <text x="55" y="35" class="status-text">PIPELINE OPERATIONAL · v1.0.0</text>
</svg>
